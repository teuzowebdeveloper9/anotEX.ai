<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (function () {
        var img = new Image();
        img.onload = function () {
          var canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          var d = ctx.getImageData(0, 0, canvas.width, canvas.height);
          for (var i = 0; i < d.data.length; i += 4) {
            d.data[i]     = 255 - d.data[i];
            d.data[i + 1] = 255 - d.data[i + 1];
            d.data[i + 2] = 255 - d.data[i + 2];
          }
          ctx.putImageData(d, 0, 0);
          document.querySelector("link[rel='icon']").href = canvas.toDataURL('image/png');
        };
        img.src = '/favicon.png';
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anotEX.ai — Transcrição de aulas com IA</title>
    <meta name="description" content="Grave, transcreva e resuma qualquer aula automaticamente com IA." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
